<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>リフォーム報告書</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --green:#2D5A3D;--green-light:#EAF0EC;--gold:#B8832A;
  --bg:#F4F2ED;--white:#FFFFFF;--text:#1C1C1A;--sub:#6A6A65;
  --border:#D6D3CB;--danger:#B03030;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}
.app-header{background:var(--green);color:white;padding:16px 18px 12px;position:sticky;top:0;z-index:200;}
.app-header h1{font-size:16px;font-weight:700;letter-spacing:.05em;}
.app-header .sub{font-family:'DM Mono',monospace;font-size:11px;opacity:.65;margin-top:2px;}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:78px;padding:11px 6px;font-size:12px;font-weight:500;font-family:'Noto Sans JP',sans-serif;text-align:center;cursor:pointer;border:none;background:none;color:var(--sub);border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:700;}
.tab.done{color:var(--green);}
.tab.done::after{content:' ✓';font-size:10px;}
.section{display:none;padding:16px;animation:fadeUp .2s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.06);}
.card-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--green);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid var(--green-light);}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;letter-spacing:.03em;}
.field label .req{color:var(--danger);margin-left:2px;}
input[type=text],input[type=date],textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:#FAFAF7;transition:border-color .2s;outline:none;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--green);background:var(--white);}
textarea{resize:vertical;min-height:80px;line-height:1.7;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px 18px;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.03em;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--green);color:white;}
.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);}
.btn-add{background:var(--green-light);color:var(--green);border:1.5px dashed var(--green);}
.btn-pdf{background:var(--gold);color:white;font-size:16px;padding:16px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:200;}
.bottom-bar .btn{flex:1;}
.spot-item{border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.04);}
.spot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.spot-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;background:var(--green-light);color:var(--green);padding:3px 9px;border-radius:4px;}
.btn-del{background:none;border:none;color:var(--danger);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
.photo-zone{border:2px dashed var(--border);border-radius:9px;padding:22px 16px;text-align:center;cursor:pointer;background:#FAFAF7;transition:all .2s;margin-top:10px;display:block;}
.photo-zone:active{border-color:var(--green);background:var(--green-light);}
.photo-zone input{display:none;}
.photo-icon{font-size:30px;}
.photo-hint{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.photo-thumb{position:relative;aspect-ratio:4/3;border-radius:7px;overflow:hidden;border:1px solid var(--border);touch-action:none;cursor:grab;transition:transform .15s,box-shadow .15s;}
.photo-thumb.dragging{opacity:.5;transform:scale(.95);box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:10;}
.photo-thumb.drag-over{border:2px solid var(--green);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.preview-wrap{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
.preview-head{background:var(--green);color:white;padding:20px;text-align:center;}
.preview-head h2{font-size:18px;font-weight:700;letter-spacing:.06em;}
.preview-head .pdate{font-family:'DM Mono',monospace;font-size:11px;opacity:.75;margin-top:5px;}
.preview-body{padding:16px;}
.p-section{margin-bottom:18px;}
.p-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--green);text-transform:uppercase;padding-bottom:6px;border-bottom:1.5px solid var(--green-light);margin-bottom:10px;}
.p-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg);}
.p-row:last-child{border-bottom:none;}
.p-key{font-size:12px;font-weight:700;color:var(--sub);min-width:80px;flex-shrink:0;}
.p-val{font-size:13px;color:var(--text);flex:1;line-height:1.6;}
.p-spot{margin-bottom:16px;}
.p-spot-name{font-size:13px;font-weight:700;background:var(--green-light);color:var(--green);padding:6px 10px;border-radius:6px;margin-bottom:8px;}
.p-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.p-photo{aspect-ratio:4/3;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.p-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.note-box{background:var(--bg);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.print-note{font-size:12px;color:var(--sub);text-align:center;margin-bottom:12px;line-height:1.7;}
</style>
</head>
<body>
<div class="app-header">
  <h1>🏠 リフォーム作業報告書</h1>
  <div class="sub">現場でスマホ入力 → PDF送付</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="gotoTab(0)" id="tab0">① 基本情報</button>
  <button class="tab" onclick="gotoTab(1)" id="tab1">② 作業箇所</button>
  <button class="tab" onclick="gotoTab(2)" id="tab2">③ 特記事項</button>
  <button class="tab" onclick="gotoTab(3)" id="tab3">④ 確認・PDF</button>
</div>

<div class="section active" id="sec0">
  <div class="card">
    <div class="card-title">物件情報</div>
    <div class="field">
      <label>事業者名</label>
      <input type="text" id="biz_name" value="アメニティ">
    </div>
    <div class="field">
      <label>物件名<span class="req">*</span></label>
      <input type="text" id="prop_name" placeholder="例）ライオンズマンション渋谷" oninput="markDone(0)">
    </div>
    <div class="row2">
      <div class="field">
        <label>部屋番号</label>
        <input type="text" id="room_num" placeholder="例）305号室">
      </div>
      <div class="field">
        <label>作業日<span class="req">*</span></label>
        <input type="date" id="work_date" oninput="markDone(0)">
      </div>
    </div>
    <div class="field">
      <label>担当者名</label>
      <input type="text" id="worker" value="大城">
    </div>
  </div>
</div>

<div class="section" id="sec1">
  <div id="spots-container"></div>
  <button class="btn btn-add" onclick="addSpot()">＋ 作業箇所を追加</button>
</div>

<div class="section" id="sec2">
  <div class="card">
    <div class="card-title">特記事項・コメント</div>
    <div class="field">
      <textarea id="notes" placeholder="例）エアコン下の染み跡は既存の汚れです。" rows="6"></textarea>
    </div>
  </div>
</div>

<div class="section" id="sec3">
  <div class="preview-wrap">
    <div class="preview-head">
      <h2>リフォーム作業報告書</h2>
      <div class="pdate" id="p-created"></div>
    </div>
    <div class="preview-body">
      <div class="p-section">
        <div class="p-section-title">物件情報</div>
        <div class="p-row"><div class="p-key">事業者名</div><div class="p-val" id="p-biz"></div></div>
        <div class="p-row"><div class="p-key">物件名</div><div class="p-val" id="p-prop"></div></div>
        <div class="p-row"><div class="p-key">部屋番号</div><div class="p-val" id="p-room"></div></div>
        <div class="p-row"><div class="p-key">作業日</div><div class="p-val" id="p-date"></div></div>
        <div class="p-row"><div class="p-key">担当者</div><div class="p-val" id="p-worker"></div></div>
      </div>
      <div class="p-section">
        <div class="p-section-title">作業箇所（After写真）</div>
        <div id="p-spots"></div>
      </div>
      <div class="p-section" id="p-notes-wrap" style="display:none">
        <div class="p-section-title">特記事項</div>
        <div class="note-box" id="p-notes"></div>
      </div>
    </div>
  </div>
  <div id="save-guide" style="margin-bottom:14px;"></div>
  <button class="btn btn-pdf" onclick="doPrint()" id="btn-pdf-main">📄 PDFとして保存・印刷</button>
</div>

<div class="bottom-bar">
  <button class="btn btn-outline" onclick="prevTab()" id="btn-prev" style="display:none">← 戻る</button>
  <button class="btn btn-primary" onclick="nextTab()" id="btn-next">次へ →</button>
</div>

<script>
let currentTab = 0;
let spotCount = 0;
const spots = [];

function gotoTab(i) {
  if (i === 3) { buildPreview(); showSaveGuide(); }
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', j===i));
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  currentTab = i;
  document.getElementById('btn-prev').style.display = i===0 ? 'none' : '';
  document.getElementById('btn-next').style.display = i===3 ? 'none' : '';
  window.scrollTo(0,0);
}
function nextTab() { if (currentTab < 3) gotoTab(currentTab+1); }
function prevTab() { if (currentTab > 0) gotoTab(currentTab-1); }
function markDone(i) { document.getElementById('tab'+i).classList.add('done'); }

function addSpot() {
  spotCount++;
  const id = 's' + Date.now();
  spots.push({ id, name: '', photos: [] });
  const sidx = spots.length - 1;
  const div = document.createElement('div');
  div.className = 'spot-item';
  div.id = 'item-'+id;
  div.innerHTML = `
    <div class="spot-header">
      <span class="spot-num">箇所 ${spotCount}</span>
      <button class="btn-del" onclick="removeSpot('${id}')">×</button>
    </div>
    <div class="field">
      <label>部屋・箇所名</label>
      <input type="text" placeholder="例）南西洋室、キッチン、トイレ" oninput="spots[${sidx}].name=this.value; markDone(1)">
    </div>
    <div class="field">
      <label>After写真</label>
      <label class="photo-zone" for="file-${id}">
        <input type="file" id="file-${id}" accept="image/*" multiple onchange="addPhotos(event,'${id}',${sidx})">
        <div class="photo-icon">📷</div>
        <div class="photo-hint">タップして写真を選択<br>複数枚同時OK・長押しで並び替え</div>
      </label>
      <div class="photo-grid" id="pg-${id}"></div>
    </div>
  `;
  document.getElementById('spots-container').appendChild(div);
  markDone(1);
}

function removeSpot(id) {
  const i = spots.findIndex(s => s.id === id);
  if (i !== -1) spots.splice(i, 1);
  const el = document.getElementById('item-'+id);
  if (el) el.remove();
}

function addPhotos(event, id, sidx) {
  const files = Array.from(event.target.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      spots[sidx].photos.push({ url: e.target.result });
      loaded++;
      if (loaded === files.length) renderPhotos(id, sidx);
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotos(id, sidx) {
  const grid = document.getElementById('pg-'+id);
  grid.innerHTML = '';
  spots[sidx].photos.forEach((photo, pidx) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb';
    wrap.draggable = true;
    wrap.dataset.sidx = sidx;
    wrap.dataset.pidx = pidx;
    wrap.dataset.id = id;
    wrap.innerHTML = `<img src="${photo.url}" style="pointer-events:none"><button class="photo-thumb-del" onclick="removePhoto('${id}',${sidx},${pidx})">×</button>`;
    wrap.addEventListener('dragstart', onDragStart);
    wrap.addEventListener('dragover', onDragOver);
    wrap.addEventListener('drop', onDrop);
    wrap.addEventListener('dragend', onDragEnd);
    wrap.addEventListener('touchstart', onTouchStart, { passive: true });
    wrap.addEventListener('touchmove', onTouchMove, { passive: false });
    wrap.addEventListener('touchend', onTouchEnd);
    grid.appendChild(wrap);
  });
}

function removePhoto(id, sidx, pidx) {
  spots[sidx].photos.splice(pidx, 1);
  renderPhotos(id, sidx);
}

let dragSrc = null;
function onDragStart(e) { dragSrc = this; this.classList.add('dragging'); }
function onDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
function onDragEnd() { document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('dragging','drag-over')); }
function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  const sidx = parseInt(this.dataset.sidx);
  const from = parseInt(dragSrc.dataset.pidx);
  const to = parseInt(this.dataset.pidx);
  const moved = spots[sidx].photos.splice(from, 1)[0];
  spots[sidx].photos.splice(to, 0, moved);
  renderPhotos(this.dataset.id, sidx);
}

let touchDragEl = null, touchClone = null, touchSidx, touchId;
function onTouchStart(e) { touchDragEl = this; touchSidx = parseInt(this.dataset.sidx); touchId = this.dataset.id; }
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (!touchClone) {
    touchClone = touchDragEl.cloneNode(true);
    touchClone.style.cssText = `position:fixed;opacity:.7;pointer-events:none;width:${touchDragEl.offsetWidth}px;height:${touchDragEl.offsetHeight}px;border-radius:7px;overflow:hidden;z-index:999;`;
    document.body.appendChild(touchClone);
    touchDragEl.classList.add('dragging');
  }
  touchClone.style.left = (t.clientX - touchDragEl.offsetWidth/2) + 'px';
  touchClone.style.top = (t.clientY - touchDragEl.offsetHeight/2) + 'px';
  document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('drag-over'));
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const target = under && under.closest('.photo-thumb');
  if (target && target !== touchDragEl) target.classList.add('drag-over');
}
function onTouchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  touchDragEl && touchDragEl.classList.remove('dragging');
  const t = e.changedTouches[0];
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const target = under && under.closest('.photo-thumb');
  document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('drag-over'));
  if (target && target !== touchDragEl) {
    const from = parseInt(touchDragEl.dataset.pidx);
    const to = parseInt(target.dataset.pidx);
    const moved = spots[touchSidx].photos.splice(from, 1)[0];
    spots[touchSidx].photos.splice(to, 0, moved);
    renderPhotos(touchId, touchSidx);
  }
  touchDragEl = null;
}

function buildPreview() {
  const biz = document.getElementById('biz_name').value || '—';
  const prop = document.getElementById('prop_name').value || '（未入力）';
  const room = document.getElementById('room_num').value || '—';
  const wd = document.getElementById('work_date').value;
  const wkr = document.getElementById('worker').value || '—';
  const note = document.getElementById('notes').value;
  const dateStr = wd ? new Date(wd+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '—';
  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('p-created').textContent = '作成日：' + today;
  document.getElementById('p-biz').textContent = biz;
  document.getElementById('p-prop').textContent = prop;
  document.getElementById('p-room').textContent = room;
  document.getElementById('p-date').textContent = dateStr;
  document.getElementById('p-worker').textContent = wkr;
  const spotsEl = document.getElementById('p-spots');
  spotsEl.innerHTML = '';
  if (spots.length === 0) {
    spotsEl.innerHTML = '<div style="font-size:13px;color:var(--sub);">作業箇所が登録されていません</div>';
  } else {
    spots.forEach(spot => {
      const photos = spot.photos.map(p => p.url);
      const div = document.createElement('div');
      div.className = 'p-spot';
      let photosHTML = '';
      if (photos.length > 0) {
        for (let i = 0; i < photos.length; i += 2) {
          const group = photos.slice(i, i+2);
          photosHTML += '<div class="p-photo-grid">' + group.map(url => `<div class="p-photo"><img src="${url}"></div>`).join('') + '</div>';
        }
      } else {
        photosHTML = '<div style="font-size:12px;color:var(--sub);padding:4px 0">写真なし</div>';
      }
      div.innerHTML = `<div class="p-spot-name">📍 ${spot.name || '（箇所名未入力）'}</div>${photosHTML}`;
      spotsEl.appendChild(div);
    });
  }
  if (note.trim()) {
    document.getElementById('p-notes-wrap').style.display = '';
    document.getElementById('p-notes').textContent = note;
  } else {
    document.getElementById('p-notes-wrap').style.display = 'none';
  }
}

function isIOSChrome() { return /iPhone|iPad|iPod/.test(navigator.userAgent) && /CriOS/.test(navigator.userAgent); }

function showSaveGuide() {
  const guide = document.getElementById('save-guide');
  if (isIOSChrome()) {
    guide.innerHTML = `<div style="background:#FFF8EC;border:1.5px solid #E8C46A;border-radius:10px;padding:14px;">
      <div style="font-size:13px;font-weight:700;color:#7A5000;margin-bottom:8px;">⚠️ iPhoneのChromeではPDF保存できません</div>
      <div style="font-size:12px;color:#5A4000;line-height:1.7;"><b>Safariで開き直してください。</b><br>Safari → PDFボタン → 「ファイルに保存」</div>
    </div>`;
  } else {
    guide.innerHTML = `<p class="print-note">ボタンを押すとPDFが自動ダウンロードされます。</p>`;
  }
}

// ---- PDF生成 ----
async function doPrint() {
  showSaveGuide();
  if (isIOSChrome()) return;
  if (typeof window.jspdf === 'undefined') { alert('ライブラリ読み込み中です。少し待ってから再度お試しください。'); return; }

  const btn = document.getElementById('btn-pdf-main');
  btn.textContent = '⏳ 写真準備中...';
  btn.disabled = true;

  const biz  = document.getElementById('biz_name').value  || '—';
  const prop = document.getElementById('prop_name').value || '（未入力）';
  const room = document.getElementById('room_num').value  || '—';
  const wd   = document.getElementById('work_date').value;
  const wkr  = document.getElementById('worker').value   || '—';
  const note = document.getElementById('notes').value;
  const dateStr = wd ? new Date(wd+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '—';
  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // ページ組み立て（6枚/ページ）
  const PER = 6;
  const pdfPages = [];
  let firstDone = false;
  spots.forEach(spot => {
    const photos = spot.photos.map(p => p.url);
    const name = spot.name || '（箇所名未入力）';
    let i = 0;
    do {
      const g = photos.slice(i, i+PER);
      while (g.length < PER) g.push(null);
      pdfPages.push({ type: firstDone ? 'photo' : 'first', name, photos: g });
      firstDone = true;
      i += PER;
    } while (i < photos.length);
  });

  // フォント待機（Safari対応）
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 500));

  // 写真リサイズ
  const urlSet = [...new Set(pdfPages.flatMap(p => p.photos).filter(Boolean))];
  const resizeMap = new Map();
  await Promise.all(urlSet.map(url => new Promise(resolve => {
    const img = new Image();
    const t = setTimeout(() => resolve(), 15000);
    img.onload = () => {
      clearTimeout(t);
      const maxW = 1500;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resizeMap.set(url, c.toDataURL('image/jpeg', 0.82));
      resolve();
    };
    img.onerror = () => { clearTimeout(t); resolve(); };
    img.src = url;
  })));

  btn.textContent = '⏳ PDF生成中...';

  const MM2PX = 3.7795;
  function mm2px(mm) { return Math.round(mm * MM2PX); }

  // Canvasでヘッダー描画（日本語フォント使用）
  function makeHeaderCanvas(cwMm) {
    const W = mm2px(cwMm);
    const rowH = 26, headerH = 44, labelH = 24;
    let totalH = headerH + rowH * 5 + 6 + labelH;
    if (note.trim()) totalH += labelH + 32 + 4;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = totalH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, totalH);
    let y = 0;
    // タイトルバー
    ctx.fillStyle = '#2D5A3D'; ctx.fillRect(0, y, W, headerH);
    ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
    ctx.font = "bold 18px 'Noto Sans JP', sans-serif";
    ctx.fillText('リフォーム作業報告書', W/2, y+26);
    ctx.font = "12px 'Noto Sans JP', sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('作成日：' + today, W/2, y+40);
    y += headerH;
    // 物件情報
    const rows = [['事業者名',biz],['物件名',prop],['部屋番号',room],['作業日',dateStr],['担当者',wkr]];
    rows.forEach((row, ri) => {
      ctx.fillStyle = ri%2===0 ? '#F4F2ED' : '#FAFAF8'; ctx.fillRect(0, y, W, rowH);
      ctx.fillStyle = '#D6D3CB'; ctx.fillRect(0, y+rowH-1, W, 1);
      ctx.fillStyle = '#6A6A65'; ctx.textAlign = 'left';
      ctx.font = "bold 12px 'Noto Sans JP', sans-serif";
      ctx.fillText(row[0], 10, y+rowH*0.68);
      ctx.fillStyle = '#1C1C1A';
      ctx.font = "13px 'Noto Sans JP', sans-serif";
      ctx.fillText(row[1], W*0.27, y+rowH*0.68);
      y += rowH;
    });
    y += 6;
    // 特記事項
    if (note.trim()) {
      ctx.fillStyle = '#EAF0EC'; ctx.fillRect(0, y, W, labelH);
      ctx.fillStyle = '#2D5A3D'; ctx.textAlign = 'left';
      ctx.font = "bold 12px 'Noto Sans JP', sans-serif";
      ctx.fillText('特記事項', 10, y+labelH*0.72);
      y += labelH;
      ctx.fillStyle = '#F4F2ED'; ctx.fillRect(0, y, W, 32);
      ctx.fillStyle = '#1C1C1A';
      ctx.font = "12px 'Noto Sans JP', sans-serif";
      ctx.fillText(note.replace(/\n/g,' ').substring(0,65), 10, y+22);
      y += 36;
    }
    // 場所ラベル
    ctx.fillStyle = '#EAF0EC'; ctx.fillRect(0, y, W, labelH);
    ctx.fillStyle = '#2D5A3D'; ctx.textAlign = 'left';
    ctx.font = "bold 13px 'Noto Sans JP', sans-serif";
    ctx.fillText('📍 ' + pdfPages[0].name, 10, y+labelH*0.72);
    return { dataUrl: canvas.toDataURL('image/png'), heightMm: totalH / MM2PX };
  }

  function makeLabelCanvas(name, cwMm) {
    const W = mm2px(cwMm), labelH = 24;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = labelH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#EAF0EC'; ctx.fillRect(0, 0, W, labelH);
    ctx.fillStyle = '#2D5A3D'; ctx.textAlign = 'left';
    ctx.font = "bold 13px 'Noto Sans JP', sans-serif";
    ctx.fillText('📍 ' + name, 10, labelH*0.72);
    return { dataUrl: canvas.toDataURL('image/png'), heightMm: labelH / MM2PX };
  }

  function makeNoImageCanvas(wMm, hMm) {
    const W = mm2px(wMm), H = mm2px(hMm);
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#F4F2ED'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#D6D3CB'; ctx.lineWidth = 1; ctx.strokeRect(0,0,W,H);
    ctx.fillStyle = '#B0AEA8'; ctx.textAlign = 'center';
    ctx.font = '13px sans-serif';
    ctx.fillText('No Image', W/2, H/2+5);
    return canvas.toDataURL('image/png');
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
  const PW = 210, PH = 297, PAD = 8, CW = PW - PAD*2;

  for (let pi = 0; pi < pdfPages.length; pi++) {
    const page = pdfPages[pi];
    if (pi > 0) pdf.addPage();
    let y = PAD;

    if (pi === 0) {
      const h = makeHeaderCanvas(CW);
      pdf.addImage(h.dataUrl, 'PNG', PAD, y, CW, h.heightMm);
      y += h.heightMm + 2;
    } else {
      const lbl = makeLabelCanvas(page.name, CW);
      pdf.addImage(lbl.dataUrl, 'PNG', PAD, y, CW, lbl.heightMm);
      y += lbl.heightMm + 2;
    }

    const cols = 2, rows2 = 3, gap = 2;
    const cellW = (CW - gap) / cols;
    const availH = PH - y - PAD;
    const cellH = Math.min((availH - gap*(rows2-1)) / rows2, 72);

    page.photos.forEach((url, idx) => {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const cx = PAD + col*(cellW+gap);
      const cy = y + row*(cellH+gap);
      if (url && resizeMap.has(url)) {
        try { pdf.addImage(resizeMap.get(url), 'JPEG', cx, cy, cellW, cellH, '', 'FAST'); }
        catch(e) { pdf.addImage(makeNoImageCanvas(cellW, cellH), 'PNG', cx, cy, cellW, cellH); }
      } else {
        pdf.addImage(makeNoImageCanvas(cellW, cellH), 'PNG', cx, cy, cellW, cellH);
      }
    });
  }

  const filename = (prop !== '（未入力）' ? prop : '報告書') + '_' + (room !== '—' ? room : '') + '.pdf';
  pdf.save(filename);
  btn.textContent = '📄 PDFとして保存・印刷';
  btn.disabled = false;
}

// Init
const todayVal = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD形式
document.getElementById('work_date').setAttribute('value', todayVal);
document.getElementById('work_date').value = todayVal;
addSpot();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
