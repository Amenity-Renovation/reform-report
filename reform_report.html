<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>リフォーム報告書</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --green: #2D5A3D;
  --green-light: #EAF0EC;
  --gold: #B8832A;
  --bg: #F4F2ED;
  --white: #FFFFFF;
  --text: #1C1C1A;
  --sub: #6A6A65;
  --border: #D6D3CB;
  --danger: #B03030;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
}
.app-header {
  background: var(--green);
  color: white;
  padding: 16px 18px 12px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.app-header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
.app-header .sub { font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0.65; margin-top: 2px; }

.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; min-width: 78px;
  padding: 11px 6px;
  font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  cursor: pointer;
  border: none; background: none;
  color: var(--sub);
  border-bottom: 2.5px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
.tab.done { color: var(--green); }
.tab.done::after { content: ' ✓'; font-size: 10px; }

.section { display: none; padding: 16px; animation: fadeUp 0.2s ease; }
.section.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.card-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--green);
  text-transform: uppercase;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1.5px solid var(--green-light);
}

.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 6px; letter-spacing: 0.03em; }
.field label .req { color: var(--danger); margin-left: 2px; }
input[type=text], input[type=date], textarea {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
  color: var(--text); background: #FAFAF7;
  transition: border-color 0.2s; outline: none;
  -webkit-appearance: none;
}
input:focus, textarea:focus { border-color: var(--green); background: var(--white); }
textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 13px 18px;
  border: none; border-radius: 9px;
  font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--green); color: white; }
.btn-outline { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
.btn-add { background: var(--green-light); color: var(--green); border: 1.5px dashed var(--green); }
.btn-pdf { background: var(--gold); color: white; font-size: 16px; padding: 16px; }

.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; gap: 10px; z-index: 200;
}
.bottom-bar .btn { flex: 1; }

.spot-item {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 14px; margin-bottom: 12px;
  background: var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.spot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.spot-num {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  background: var(--green-light); color: var(--green); padding: 3px 9px; border-radius: 4px;
}
.btn-del { background: none; border: none; color: var(--danger); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }

.photo-zone {
  border: 2px dashed var(--border); border-radius: 9px;
  padding: 22px 16px; text-align: center; cursor: pointer;
  background: #FAFAF7; transition: all 0.2s; margin-top: 10px; display: block;
}
.photo-zone:active { border-color: var(--green); background: var(--green-light); }
.photo-zone input { display: none; }
.photo-icon { font-size: 30px; }
.photo-hint { font-size: 12px; color: var(--sub); margin-top: 6px; line-height: 1.5; }

.photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.photo-thumb {
  position: relative; aspect-ratio: 4/3;
  border-radius: 7px; overflow: hidden; border: 1px solid var(--border);
  touch-action: none; cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s;
}
.photo-thumb.dragging {
  opacity: 0.5; transform: scale(0.95);
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  z-index: 10;
}
.photo-thumb.drag-over { border: 2px solid var(--green); }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-thumb-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.55); color: white;
  font-size: 10px; padding: 4px 7px; font-weight: 500;
}
.photo-thumb-del {
  position: absolute; top: 4px; right: 4px;
  background: rgba(0,0,0,0.6); color: white;
  border: none; border-radius: 50%; width: 22px; height: 22px;
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Preview */
.preview-wrap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.preview-head { background: var(--green); color: white; padding: 20px; text-align: center; }
.preview-head h2 { font-size: 18px; font-weight: 700; letter-spacing: 0.06em; }
.preview-head .pdate { font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0.75; margin-top: 5px; }
.preview-body { padding: 16px; }
.p-section { margin-bottom: 18px; }
.p-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--green);
  text-transform: uppercase; padding-bottom: 6px;
  border-bottom: 1.5px solid var(--green-light); margin-bottom: 10px;
}
.p-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--bg); }
.p-row:last-child { border-bottom: none; }
.p-key { font-size: 12px; font-weight: 700; color: var(--sub); min-width: 80px; flex-shrink: 0; }
.p-val { font-size: 13px; color: var(--text); flex: 1; line-height: 1.6; }
.p-spot { margin-bottom: 16px; }
.p-spot-name { font-size: 13px; font-weight: 700; background: var(--green-light); color: var(--green); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; }
.p-photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.p-photo { aspect-ratio: 4/3; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
.p-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.p-photo-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 3px 6px; }
.note-box { background: var(--bg); border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
.print-note { font-size: 12px; color: var(--sub); text-align: center; margin-bottom: 12px; line-height: 1.7; }

@media print {
  body { background: white; padding: 0; margin: 0; }
  .app-header, .tabs, .bottom-bar { display: none !important; }
  .section { display: none !important; }
  .section.active { display: block !important; padding: 0; }
  .preview-wrap { border: none; box-shadow: none; }
  .btn-pdf, .print-note, #save-guide { display: none !important; }
  .preview-head { padding: 10px 16px; }
  .preview-head h2 { font-size: 16px; }
  .preview-body { padding: 8px 12px; }
  .p-section { margin-bottom: 8px; }
  .p-row { padding: 4px 0; }
  .p-spot { margin-bottom: 0; }
  .p-spot-name { margin-bottom: 4px; padding: 4px 8px; font-size: 12px; }
  /* 写真グリッドを固定サイズのブロックとして扱う */
  .print-photo-page {
    page-break-inside: avoid;
    break-inside: avoid;
    page-break-before: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    width: 100%;
    margin-bottom: 3px;
  }
  .print-photo-page .p-photo {
    height: 88px;
    width: 100%;
    overflow: hidden;
    border-radius: 3px;
    aspect-ratio: unset;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .print-photo-page .p-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  @page { margin: 8mm; size: A4; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>🏠 リフォーム作業報告書</h1>
  <div class="sub">現場でスマホ入力 → PDF送付</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="gotoTab(0)" id="tab0">① 基本情報</button>
  <button class="tab" onclick="gotoTab(1)" id="tab1">② 作業箇所</button>
  <button class="tab" onclick="gotoTab(2)" id="tab2">③ 特記事項</button>
  <button class="tab" onclick="gotoTab(3)" id="tab3">④ 確認・PDF</button>
</div>

<!-- STEP 1 -->
<div class="section active" id="sec0">
  <div class="card">
    <div class="card-title">物件情報</div>
    <div class="field">
      <label>事業者名</label>
      <input type="text" id="biz_name" placeholder="例）アメニティ" value="アメニティ">
    </div>
    <div class="field">
      <label>物件名<span class="req">*</span></label>
      <input type="text" id="prop_name" placeholder="例）ライオンズマンション渋谷" oninput="markDone(0)">
    </div>
    <div class="row2">
      <div class="field">
        <label>部屋番号</label>
        <input type="text" id="room_num" placeholder="例）305号室">
      </div>
      <div class="field">
        <label>作業日<span class="req">*</span></label>
        <input type="date" id="work_date" oninput="markDone(0)">
      </div>
    </div>
    <div class="field">
      <label>担当者名</label>
      <input type="text" id="worker" placeholder="例）山田 太郎" value="大城">
    </div>
  </div>
</div>

<!-- STEP 2 -->
<div class="section" id="sec1">
  <div id="spots-container"></div>
  <button class="btn btn-add" onclick="addSpot()">＋ 作業箇所を追加</button>
</div>

<!-- STEP 3 -->
<div class="section" id="sec2">
  <div class="card">
    <div class="card-title">特記事項・コメント</div>
    <div class="field">
      <textarea id="notes" placeholder="例）エアコン下の染み跡は既存の汚れです。クローゼット内の小傷は入居前から確認済み。" rows="6"></textarea>
    </div>
  </div>
</div>

<!-- STEP 4 -->
<div class="section" id="sec3">
  <div class="preview-wrap" id="preview-area">
    <div class="preview-head">
      <h2>リフォーム作業報告書</h2>
      <div class="pdate" id="p-created"></div>
    </div>
    <div class="preview-body">
      <div class="p-section">
        <div class="p-section-title">物件情報</div>
        <div class="p-row"><div class="p-key">事業者名</div><div class="p-val" id="p-biz"></div></div>
        <div class="p-row"><div class="p-key">物件名</div><div class="p-val" id="p-prop"></div></div>
        <div class="p-row"><div class="p-key">部屋番号</div><div class="p-val" id="p-room"></div></div>
        <div class="p-row"><div class="p-key">作業日</div><div class="p-val" id="p-date"></div></div>
        <div class="p-row"><div class="p-key">担当者</div><div class="p-val" id="p-worker"></div></div>
      </div>
      <div class="p-section">
        <div class="p-section-title">作業箇所（After写真）</div>
        <div id="p-spots"></div>
      </div>
      <div class="p-section" id="p-notes-wrap" style="display:none">
        <div class="p-section-title">特記事項</div>
        <div class="note-box" id="p-notes"></div>
      </div>
    </div>
  </div>
  <div id="save-guide" style="margin-bottom:14px;"></div>
  <button class="btn btn-pdf" onclick="doPrint()" id="btn-pdf-main">📄 PDFとして保存・印刷</button>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn btn-outline" onclick="prevTab()" id="btn-prev" style="display:none">← 戻る</button>
  <button class="btn btn-primary" onclick="nextTab()" id="btn-next">次へ →</button>
</div>

<script>
let currentTab = 0;
let spotCount = 0;
const spots = [];

function gotoTab(i) {
  if (i === 3) { buildPreview(); showSaveGuide(); }
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', j===i));
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  currentTab = i;
  document.getElementById('btn-prev').style.display = i===0 ? 'none' : '';
  document.getElementById('btn-next').style.display = i===3 ? 'none' : '';
  window.scrollTo(0,0);
}
function nextTab() { if (currentTab < 3) gotoTab(currentTab+1); }
function prevTab() { if (currentTab > 0) gotoTab(currentTab-1); }
function markDone(i) { document.getElementById('tab'+i).classList.add('done'); }

function addSpot() {
  spotCount++;
  const id = 's' + Date.now();
  const obj = { id, name: '', photos: [] };
  spots.push(obj);
  const sidx = spots.length - 1;

  const div = document.createElement('div');
  div.className = 'spot-item';
  div.id = 'item-'+id;
  div.innerHTML = `
    <div class="spot-header">
      <span class="spot-num">箇所 ${spotCount}</span>
      <button class="btn-del" onclick="removeSpot('${id}')">×</button>
    </div>
    <div class="field">
      <label>部屋・箇所名</label>
      <input type="text" placeholder="例）南西洋室、キッチン、トイレ"
        oninput="spots[${sidx}].name=this.value; markDone(1)">
    </div>
    <div class="field">
      <label>After写真</label>
      <label class="photo-zone" for="file-${id}">
        <input type="file" id="file-${id}" accept="image/*" multiple onchange="addPhotos(event,'${id}',${sidx})">
        <div class="photo-icon">📷</div>
        <div class="photo-hint">タップして写真を選択<br>複数枚同時OK・長押しで並び替え</div>
      </label>
      <div class="photo-grid" id="pg-${id}"></div>
    </div>
  `;
  document.getElementById('spots-container').appendChild(div);
  markDone(1);
}

function removeSpot(id) {
  const i = spots.findIndex(s => s.id === id);
  if (i !== -1) spots.splice(i, 1);
  const el = document.getElementById('item-'+id);
  if (el) el.remove();
}

function addPhotos(event, id, sidx) {
  const files = Array.from(event.target.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      spots[sidx].photos.push({ url: e.target.result });
      loaded++;
      if (loaded === files.length) renderPhotos(id, sidx);
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotos(id, sidx) {
  const grid = document.getElementById('pg-'+id);
  grid.innerHTML = '';
  spots[sidx].photos.forEach((photo, pidx) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb';
    wrap.draggable = true;
    wrap.dataset.sidx = sidx;
    wrap.dataset.pidx = pidx;
    wrap.dataset.id = id;
    wrap.innerHTML = `
      <img src="${photo.url}" style="pointer-events:none">
      <button class="photo-thumb-del" onclick="removePhoto('${id}',${sidx},${pidx})">×</button>
    `;
    wrap.addEventListener('dragstart', onDragStart);
    wrap.addEventListener('dragover',  onDragOver);
    wrap.addEventListener('drop',      onDrop);
    wrap.addEventListener('dragend',   onDragEnd);
    wrap.addEventListener('touchstart', onTouchStart, { passive: true });
    wrap.addEventListener('touchmove',  onTouchMove,  { passive: false });
    wrap.addEventListener('touchend',   onTouchEnd);
    grid.appendChild(wrap);
  });
}

function removePhoto(id, sidx, pidx) {
  spots[sidx].photos.splice(pidx, 1);
  renderPhotos(id, sidx);
}

// ---- Drag & Drop (desktop) ----
let dragSrc = null;
function onDragStart(e) { dragSrc = this; this.classList.add('dragging'); }
function onDragOver(e)  { e.preventDefault(); this.classList.add('drag-over'); }
function onDragEnd()    { document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('dragging','drag-over')); }
function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  const sidx = parseInt(this.dataset.sidx);
  const from = parseInt(dragSrc.dataset.pidx);
  const to   = parseInt(this.dataset.pidx);
  const id   = this.dataset.id;
  const moved = spots[sidx].photos.splice(from, 1)[0];
  spots[sidx].photos.splice(to, 0, moved);
  renderPhotos(id, sidx);
}

// ---- Touch drag (mobile) ----
let touchDragEl = null, touchClone = null, touchSidx, touchId;
function onTouchStart(e) {
  touchDragEl = this;
  touchSidx = parseInt(this.dataset.sidx);
  touchId   = this.dataset.id;
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (!touchClone) {
    touchClone = touchDragEl.cloneNode(true);
    touchClone.style.cssText = `position:fixed;opacity:0.7;pointer-events:none;width:${touchDragEl.offsetWidth}px;height:${touchDragEl.offsetHeight}px;border-radius:7px;overflow:hidden;z-index:999;`;
    document.body.appendChild(touchClone);
    touchDragEl.classList.add('dragging');
  }
  touchClone.style.left = (t.clientX - touchDragEl.offsetWidth/2) + 'px';
  touchClone.style.top  = (t.clientY - touchDragEl.offsetHeight/2) + 'px';
  document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('drag-over'));
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const target = under && under.closest('.photo-thumb');
  if (target && target !== touchDragEl) target.classList.add('drag-over');
}
function onTouchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  touchDragEl && touchDragEl.classList.remove('dragging');
  const t = e.changedTouches[0];
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const target = under && under.closest('.photo-thumb');
  document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('drag-over'));
  if (target && target !== touchDragEl) {
    const from = parseInt(touchDragEl.dataset.pidx);
    const to   = parseInt(target.dataset.pidx);
    const moved = spots[touchSidx].photos.splice(from, 1)[0];
    spots[touchSidx].photos.splice(to, 0, moved);
    renderPhotos(touchId, touchSidx);
  }
  touchDragEl = null;
}

function buildPreview() {
  const biz  = document.getElementById('biz_name').value  || '—';
  const prop = document.getElementById('prop_name').value || '（未入力）';
  const room = document.getElementById('room_num').value  || '—';
  const wd   = document.getElementById('work_date').value;
  const wkr  = document.getElementById('worker').value   || '—';
  const note = document.getElementById('notes').value;

  const dateStr = wd
    ? new Date(wd+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})
    : '—';
  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  document.getElementById('p-created').textContent = '作成日：' + today;
  document.getElementById('p-biz').textContent     = biz;
  document.getElementById('p-prop').textContent    = prop;
  document.getElementById('p-room').textContent    = room;
  document.getElementById('p-date').textContent    = dateStr;
  document.getElementById('p-worker').textContent  = wkr;

  const spotsEl = document.getElementById('p-spots');
  spotsEl.innerHTML = '';
  if (spots.length === 0) {
    spotsEl.innerHTML = '<div style="font-size:13px;color:var(--sub);">作業箇所が登録されていません</div>';
  } else {
    spots.forEach(spot => {
      const photos = spot.photos.map(p => p.url);
      const div = document.createElement('div');
      div.className = 'p-spot';
      // 写真を2枚ずつの行に分割（各行がページをまたがない）
      let photosHTML = '';
      if (photos.length > 0) {
        for (let i = 0; i < photos.length; i += 2) {
          const group = photos.slice(i, i + 2);
          photosHTML += '<div class="print-photo-page p-photo-grid">' +
            group.map(url => `<div class="p-photo"><img src="${url}"></div>`).join('') +
            '</div>';
        }
      } else {
        photosHTML = '<div style="font-size:12px;color:var(--sub);padding:4px 0">写真なし</div>';
      }
      div.innerHTML = `<div class="p-spot-name">📍 ${spot.name || '（箇所名未入力）'}</div>${photosHTML}`;
      spotsEl.appendChild(div);
    });
  }

  if (note.trim()) {
    document.getElementById('p-notes-wrap').style.display = '';
    document.getElementById('p-notes').textContent = note;
  } else {
    document.getElementById('p-notes-wrap').style.display = 'none';
  }
}

function isIOSChrome() {
  const ua = navigator.userAgent;
  return /iPhone|iPad|iPod/.test(ua) && /CriOS/.test(ua);
}
function isSafari() {
  const ua = navigator.userAgent;
  return /iPhone|iPad|iPod/.test(ua) && !/CriOS/.test(ua) && !/FxiOS/.test(ua);
}

function showSaveGuide() {
  const guide = document.getElementById('save-guide');
  if (isIOSChrome()) {
    guide.innerHTML = `
      <div style="background:#FFF8EC;border:1.5px solid #E8C46A;border-radius:10px;padding:14px;margin-bottom:4px;">
        <div style="font-size:13px;font-weight:700;color:#7A5000;margin-bottom:8px;">⚠️ iPhoneのChromeではPDF保存できません</div>
        <div style="font-size:12px;color:#5A4000;line-height:1.7;">
          <b>方法①（推奨）</b><br>
          このファイルを <b>Safari</b> で開き直してください。<br>
          Safari → 📄 PDFボタン → 「ファイルに保存」でPDFになります。<br><br>
          <b>方法②</b><br>
          このプレビュー画面を <b>スクリーンショット</b>（サイドボタン＋音量上）で保存して管理会社に送ることもできます。
        </div>
      </div>`;
  } else if (isSafari()) {
    guide.innerHTML = `<p class="print-note">「PDFとして保存」ボタン → 印刷ダイアログ →<br>左下のPDFアイコン → 「ファイルに保存」</p>`;
  } else {
    guide.innerHTML = `<p class="print-note">ボタンを押すと印刷ダイアログが開きます。<br>「PDFとして保存」を選択してください。</p>`;
  }
}

async function doPrint() {
  showSaveGuide();
  if (isIOSChrome()) return;

  const btn = document.getElementById('btn-pdf-main');
  // 全画像を先に読み込む
  btn.textContent = '⏳ 写真読み込み中...';
  const allUrls = pages.flatMap(p => p.photos);
  const allImages = await Promise.all(allUrls.map(url => loadImage(url)));
  // urlをキーにしたMapを作る
  const imgMap = new Map();
  allUrls.forEach((url, i) => { if (url) imgMap.set(url, allImages[i]); });

  btn.textContent = '⏳ PDF生成中...';
  btn.disabled = true;

  const biz  = document.getElementById('biz_name').value  || '—';
  const prop = document.getElementById('prop_name').value || '（未入力）';
  const room = document.getElementById('room_num').value  || '—';
  const wd   = document.getElementById('work_date').value;
  const wkr  = document.getElementById('worker').value   || '—';
  const note = document.getElementById('notes').value;
  const dateStr = wd
    ? new Date(wd+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})
    : '—';
  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // ページデータ組み立て（全ページ統一：6枚）
  const PHOTOS_PER_PAGE = 6;
  let pages = [];
  let isVeryFirstPage = true;
  spots.forEach(spot => {
    const photos = spot.photos.map(p => p.url);
    const name = spot.name || '（箇所名未入力）';
    const perPage = isVeryFirstPage ? PHOTOS_PER_PAGE : PHOTOS_PER_PAGE;
    let i = 0;
    do {
      const g = photos.slice(i, i + perPage);
      while (g.length < perPage) g.push(null);
      pages.push({ type: isVeryFirstPage ? 'first' : 'photo', name, photos: g });
      isVeryFirstPage = false;
      i += perPage;
    } while (i < photos.length);
  });

  // A4サイズ(px): 794×1123 @96dpi
  const A4W = 794, A4H = 1123;
  const PAD = 40;

  // 各ページをCanvasに描画してjsPDFに追加
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

  function loadImage(src) {
    return new Promise((resolve) => {
      if (!src) { resolve(null); return; }
      const img = new Image();
      const timer = setTimeout(() => resolve(null), 10000);
      img.onload = () => { clearTimeout(timer); resolve(img); };
      img.onerror = () => { clearTimeout(timer); resolve(null); };
      img.src = src;
    });
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
  }

  for (let pi = 0; pi < pages.length; pi++) {
    const page = pages[pi];
    const canvas = document.createElement('canvas');
    canvas.width = A4W; canvas.height = A4H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, A4W, A4H);

    let y = PAD;
    const contentW = A4W - PAD * 2;

    if (page.type === 'first') {
      // ヘッダー
      roundRect(ctx, PAD, y, contentW, 52, 6, '#2D5A3D', null);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('リフォーム作業報告書', A4W/2, y+30);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillText('作成日：' + today, A4W/2, y+48);
      y += 62;

      // 物件情報テーブル
      const rows = [['事業者名', biz],['物件名', prop],['部屋番号', room],['作業日', dateStr],['担当者', wkr]];
      const rowH = 28;
      roundRect(ctx, PAD, y, contentW, rowH * rows.length, 6, null, '#D6D3CB');
      rows.forEach((row, ri) => {
        const ry = y + ri * rowH;
        if (ri > 0) { ctx.beginPath(); ctx.moveTo(PAD, ry); ctx.lineTo(PAD+contentW, ry); ctx.strokeStyle='#D6D3CB'; ctx.lineWidth=1; ctx.stroke(); }
        ctx.fillStyle = '#F4F2ED'; ctx.fillRect(PAD+1, ry+1, 90, rowH-1);
        ctx.fillStyle = '#6A6A65'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(row[0], PAD+10, ry+19);
        ctx.fillStyle = '#1C1C1A'; ctx.font = '14px sans-serif';
        ctx.fillText(row[1], PAD+100, ry+19);
      });
      y += rowH * rows.length + 12;

      // 特記事項
      if (note.trim()) {
        roundRect(ctx, PAD, y, contentW, 22, 6, '#EAF0EC', null);
        ctx.fillStyle = '#2D5A3D'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('特記事項', PAD+10, y+16);
        y += 26;
        roundRect(ctx, PAD, y, contentW, 36, 4, '#F4F2ED', null);
        ctx.fillStyle = '#1C1C1A'; ctx.font = '12px sans-serif';
        ctx.fillText(note.replace(/\n/g,' ').substring(0,80), PAD+10, y+22);
        y += 44;
      }
    } else {
      y = PAD;
    }

    // 場所ラベル
    ctx.textAlign = 'left';
    roundRect(ctx, PAD, y, contentW, 28, 6, '#EAF0EC', null);
    ctx.fillStyle = '#2D5A3D'; ctx.font = 'bold 14px sans-serif';
    ctx.fillText('📍 ' + page.name, PAD+10, y+20);
    y += 36;

    // 写真グリッド（全ページ統一：2列×3行＝6枚）
    const cols = 2;
    const rows2 = 3;
    const gap = 4;
    const cellW = (contentW - gap) / cols;
    const availH = A4H - y - PAD;
    const cellHCalc = (availH - gap * (rows2 - 1)) / rows2;
    const cellH = Math.min(cellHCalc, 270);

    const images = page.photos.map(url => url ? (imgMap.get(url) || null) : null);

    images.forEach((img, idx) => {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const cx = PAD + col * (cellW + gap);
      const cy = y + row * (cellH + gap);
      roundRect(ctx, cx, cy, cellW, cellH, 4, '#F4F2ED', '#D6D3CB');
      if (img) {
        // cover fit
        const iR = img.width / img.height;
        const cR = cellW / cellH;
        let sw, sh, sx, sy;
        if (iR > cR) { sh = img.height; sw = sh * cR; sx = (img.width-sw)/2; sy = 0; }
        else { sw = img.width; sh = sw / cR; sx = 0; sy = (img.height-sh)/2; }
        ctx.save();
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(cx, cy, cellW, cellH, 4) : ctx.rect(cx, cy, cellW, cellH);
        ctx.clip();
        ctx.drawImage(img, sx, sy, sw, sh, cx, cy, cellW, cellH);
        ctx.restore();
      } else {
        ctx.fillStyle = '#B0AEA8'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('No Image', cx + cellW/2, cy + cellH/2 + 5);
      }
    });

    // PDFに追加
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    if (pi > 0) pdf.addPage();
    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
  }

  const filename = (prop !== '（未入力）' ? prop : '報告書') + '_' + (room !== '—' ? room : '') + '.pdf';
  pdf.save(filename);

  btn.textContent = '📄 PDFとして保存・印刷';
  btn.disabled = false;
}

// Init
document.getElementById('work_date').value = new Date().toISOString().split('T')[0];
addSpot();
</script>
